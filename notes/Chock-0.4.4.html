<h2>楔子 0.4.4<span>2026-07-13</span></h2>
<ul>
<li><strong>右键菜单现在能完整截下来</strong>——Chrome、Finder 等应用的临时菜单会在按下 Control 时先冻结；快速按 Ctrl+A 或按住 Control 后再按 A 都不会提前消失</li>
<li><strong>截图快捷键不再误唤出面板</strong>——确认是 Ctrl+A 后会取消单按 Control 的唤出动作，不再抢走其他应用焦点</li>
<li><strong>箭头标注比例更稳定</strong>——短箭头不再反向越过起点，长箭头头部更紧凑，预览与导出保持一致</li>
</ul>
